version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan_user
      POSTGRES_PASSWORD: careplan_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://careplan_user:careplan_pass@db:5432/careplan
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: "mock"

  celery:
    build: .
    command: celery -A careplan_project worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://careplan_user:careplan_pass@db:5432/careplan
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: "mock"

  test:
    build: .
    command: pytest orders/tests/ -v --tb=short
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://careplan_user:careplan_pass@db:5432/careplan
      DJANGO_SETTINGS_MODULE: careplan_project.settings
      ANTHROPIC_API_KEY: "test-key"
      LLM_PROVIDER: "mock"

volumes:
  pgdata: